# Variance-Prediction Paradox — Conda environment
# Versions match those reported in Methods §Reproducibility and software
#
# Setup:
#   conda env create -f environment.yml
#   conda activate var-pre
#
# Update after changes:
#   conda env update -f environment.yml --prune

name: var-pre
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.11
  - numpy=2.2.6
  - pandas=2.3.3
  - scikit-learn=1.7.2
  - scipy=1.15.3
  - xgboost=3.1.3
  - matplotlib=3.10.8
  - joblib=1.5.3
  - tqdm
  - requests
  - urllib3
  - pip:
    - shap==0.49.1
    - gprofiler-official==1.0.0
